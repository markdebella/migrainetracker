    L 80 575
    L 247 575
    L 247 425
    Z
  "/>

  <!-- Left lower jaw -->
  <path class="head-region" data-region="front_jaw_left" d="
    M 452 425
    C 460 460, 455 500, 440 535
    L 415 575
    L 247 575
    L 247 425
    Z
  "/>

  <!-- Right chin / neck -->
  <path class="head-region" data-region="front_neck_right" d="
    M 80 575
    C 100 615, 130 645, 170 660
    L 247 677
    L 247 575

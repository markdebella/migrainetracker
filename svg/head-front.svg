  <!-- Right forehead (viewer's left) -->
  <path class="head-region" data-region="front_forehead_right" d="
    M 247 0
    C 190 0, 120 10, 80 50
    C 60 75, 50 105, 47 140
    L 47 170
    L 247 170
    Z
  "/>

  <!-- Left forehead (viewer's right) -->
  <path class="head-region" data-region="front_forehead_left" d="
    M 247 0
    C 305 0, 375 10, 415 50
    C 435 75, 445 105, 448 140
    L 448 170
    L 247 170
    Z
  "/>

  <!-- Right temple & cheek -->
  <path class="head-region" data-region="front_temple_right" d="
    M 47 170
    L 47 260
    C 30 300, 22 330, 22 360
    C 22 390, 30 410, 42 425
    L 217 425
    L 217 170
    Z
  "/>

  <!-- Right eye / nose area (center-right strip) -->
  <path class="head-region" data-region="front_face_right" d="
    M 217 170
    L 217 425
    L 247 425
    L 247 170
    Z
  "/>

  <!-- Left eye / nose area (center-left strip) -->
  <path class="head-region" data-region="front_face_left" d="
    M 247 170
    L 247 425
    L 277 425
    L 277 170
    Z
  "/>

  <!-- Left temple & cheek -->

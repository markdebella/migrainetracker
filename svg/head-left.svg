  <path class="head-detail" d="M 134 114 C 140 110, 148 112, 150 122 C 152 132, 148 146, 143 152"/>

  <!-- Hairline -->
  <path class="head-detail" d="M 62 54 C 70 36, 88 22, 112 22 C 128 22, 142 30, 148 44"/>


  <!-- Nose bridge and tip -->
  <path class="head-detail" d="
    M 58 92 C 56 104, 52 116, 48 124
    C 52 130, 60 134, 66 130
  "/>

  <!-- Mouth -->
  <path class="head-detail" d="M 58 158 C 64 154, 74 154, 78 158 C 74 163, 64 163, 58 158"/>

  <!-- Neck -->
  <path class="head-detail" d="M 92 248 C 100 252, 112 252, 120 248"/>

  <!-- ── Clickable regions ──────────────────────────────────────────────── -->

  <!-- Crown -->
  <path class="head-region" data-region="left_crown" d="
    M 78 26 C 92 18, 116 18, 132 28
    C 138 38, 142 52, 140 62
    L 128 56 C 124 44, 114 32, 100 28

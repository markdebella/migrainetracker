<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" role="img" aria-label="Left side head view">

  <!-- ── Head outline (left profile, face points left) ─────────────────── -->
  <!-- Front of face: forehead → brow → nose → lips → chin → jaw -->
  <!-- Back of head: smooth cranial curve -->
  <path class="head-outline" d="
    M 112 22
    C 92 20, 70 34, 62 56
    C 56 70, 54 84, 54 94
    C 54 104, 52 112, 48 122
    C 44 132, 46 142, 54 150
    C 60 156, 64 164, 68 174
    C 72 184, 78 196, 92 208
    L 92 250
    L 120 250
    L 120 208
    C 132 196, 148 174, 152 148
    C 156 122, 154 90, 148 62
    C 140 32, 128 22, 112 22 Z
  "/>

  <!-- Ear (right side of image = left ear, visible in left profile) -->
  <path class="head-outline" d="
    M 128 108
    C 136 102, 150 104, 154 118
    C 158 132, 154 152, 148 158
    C 142 164, 134 162, 130 154
    C 126 146, 126 132, 128 118
    C 128 114, 128 110, 128 108 Z
  "/>

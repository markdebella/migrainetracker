<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 637" role="img" aria-label="Back head view">

  <!-- Zones match the dashed-line divisions in head_diagram.png (back) -->
  <!-- Back view: vertical center + 2 horizontal lines = 6 zones -->

  <!-- Top-left (right crown from behind) -->
  <path class="head-region" data-region="back_crown_right" d="
    M 247 0
    C 175 0, 95 15, 55 65
    C 40 85, 35 110, 33 140
    L 33 182
    L 247 182
    Z
  "/>

  <!-- Top-right (left crown from behind) -->
  <path class="head-region" data-region="back_crown_left" d="
    M 247 0
    C 320 0, 400 15, 440 65
    C 455 85, 460 110, 462 140
    L 462 182
    L 247 182
    Z
  "/>

  <!-- Mid-left (right occipital) -->
  <path class="head-region" data-region="back_occipital_right" d="
    M 33 182
    C 20 230, 15 280, 18 330
    C 22 370, 30 400, 42 428
    L 247 428
    L 247 182
    Z
  "/>

  <!-- Mid-right (left occipital) -->
  <path class="head-region" data-region="back_occipital_left" d="
    M 462 182
    C 475 230, 480 280, 477 330
    C 473 370, 465 400, 452 428
    L 247 428
    L 247 182
    Z
  "/>

  <!-- Lower-left (right neck) -->
  <path class="head-region" data-region="back_neck_right" d="
    M 42 428
    C 55 470, 75 510, 105 545
    C 130 575, 165 600, 195 620
    L 247 637
    L 247 428
    Z
  "/>

  <!-- Lower-right (left neck) -->
  <path class="head-region" data-region="back_neck_left" d="
    M 452 428
    C 440 470, 420 510, 390 545
    C 365 575, 330 600, 300 620
    L 247 637
    L 247 428
    Z
  "/>

</svg>

<div x-data="Dashboard()" x-init="init()">

  <!-- Active incident banner -->
  <div x-show="activeEntry" class="active-banner" x-cloak>
    <div class="active-banner__header">
      <div class="active-banner__title">
        <span class="pulse-dot"></span>
        Active Headache
      </div>
      <span class="type-badge thunderclap"
            x-show="activeEntry?.type?.includes('thunderclap')"
            x-text="CONFIG.attackTypes.find(t=>t.id===activeEntry?.type)?.label ?? ''">
      </span>
      <span class="type-badge"
            x-show="activeEntry && !activeEntry.type?.includes('thunderclap')"
            x-text="CONFIG.attackTypes.find(t=>t.id===activeEntry?.type)?.label ?? ''">
      </span>
    </div>
    <div class="active-banner__elapsed" x-text="elapsed" aria-live="polite" aria-label="Time elapsed"></div>
    <div class="active-banner__meta"
         x-text="'Started ' + Utils.formatDate(activeEntry?.startTime) + ' at ' + Utils.formatTime(activeEntry?.startTime)">
    </div>
    <div class="active-banner__actions">
      <button class="btn btn-primary btn-sm"
              @click="Router.go('check-in', {id: activeEntry.id})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        Check-in
      </button>
      <button class="btn btn-secondary btn-sm"
              @click="Router.go('log', {id: activeEntry.id})">
        View / Edit
      </button>
      <button class="btn btn-danger btn-sm"
              @click="endAttack()">
        End Attack
      </button>
    </div>
  </div>

  <!-- Log new headache (shown when no active) -->
  <div x-show="!activeEntry" style="margin-bottom:var(--space-lg)">
    <button class="btn btn-primary btn-lg btn-block"
            @click="Router.go('log', {id:'new'})">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      Log New Headache
    </button>
  </div>

  <!-- Stats strip -->
  <div class="stats-strip" x-show="manifest?.incidents?.length">
    <div class="stat-item">
      <div class="stat-item__value" x-text="stats.thisMonth"></div>
      <div class="stat-item__label">This Month</div>
    </div>
    <div class="stat-item">
      <div class="stat-item__value"
           :style="stats.avgPain ? `color:var(--pain-${Math.round(stats.avgPain)})` : ''"
           x-text="stats.avgPain ? stats.avgPain.toFixed(1) : '—'">
      </div>
      <div class="stat-item__label">Avg Pain</div>
    </div>
    <div class="stat-item">
      <div class="stat-item__value" x-text="stats.avgDuration || '—'"></div>
      <div class="stat-item__label">Avg Duration</div>
    </div>
  </div>

  <!-- Recent incidents -->
  <div>
    <div class="card__header" style="margin-bottom:var(--space-md)">
      <span class="section-heading">Recent Incidents</span>
      <button class="btn btn-ghost btn-sm" @click="Router.go('analytics')" x-show="manifest?.incidents?.length > 3">
        View All →
      </button>
    </div>

    <!-- Empty state -->
    <div class="empty-state" x-show="!manifest?.incidents?.length">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/>
      </svg>
      <p>No incidents logged yet.</p>
    </div>

    <!-- Incident cards -->
    <div style="display:flex;flex-direction:column;gap:var(--space-sm)" x-show="manifest?.incidents?.length">
      <template x-for="entry in recentIncidents" :key="entry.id">
        <div class="incident-card"
             :class="entry.type?.replace(/_/g,'')"
             role="button"
             tabindex="0"
             @click="Router.go('log', {id: entry.id})"
             @keydown.enter="Router.go('log', {id: entry.id})">
          <div class="incident-card__main">
            <div style="display:flex;align-items:center;gap:var(--space-sm);margin-bottom:4px;flex-wrap:wrap">
              <span class="incident-card__date" x-text="Utils.formatDate(entry.startTime)"></span>
              <span class="type-badge"
                    :class="entry.type?.includes('thunderclap') ? 'thunderclap' : ''"
                    x-text="CONFIG.attackTypes.find(t=>t.id===entry.type)?.label ?? entry.type ?? 'Unknown'">
              </span>
              <span x-show="entry.isActive"
                    style="background:var(--accent);color:#fff;font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:var(--radius-full);">
                ACTIVE
              </span>
            </div>
            <div class="incident-card__meta">
              <span x-show="!entry.isActive" x-text="Utils.formatDuration(entry.durationMinutes)"></span>
              <span x-show="entry.isActive">Ongoing — <span x-text="Utils.elapsed(entry.startTime)"></span></span>
            </div>
            <div class="pain-bar" style="width:80px;margin-top:6px" x-show="entry.peakPainLevel">
              <div class="pain-bar__fill"
                   :style="`width:${(entry.peakPainLevel/10)*100}%;background:var(--pain-${entry.peakPainLevel})`">
              </div>
            </div>
          </div>
          <div class="incident-card__right">
            <span class="incident-card__pain"
                  x-show="entry.peakPainLevel"
                  :style="`color:var(--pain-${entry.peakPainLevel})`"
                  x-text="entry.peakPainLevel">
            </span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </div>
        </div>
      </template>
    </div>

    <!-- Show all button -->
    <button class="btn btn-secondary btn-block"
            style="margin-top:var(--space-md)"
            @click="Router.go('analytics')"
            x-show="manifest?.incidents?.length > 5">
      View full history
    </button>
  </div>
</div>

<script>
function Dashboard() {
  return {
    elapsed: '',
    elapsedTimer: null,

    get manifest() { return Alpine.store('data').manifest; },
    get activeEntry() { return Manifest.activeEntry(); },

    get recentIncidents() {
      return (this.manifest?.incidents ?? []).slice(0, 8);
    },

    get stats() {
      const all = this.manifest?.incidents ?? [];
      const now = new Date();
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

      const thisMonth = all.filter(i => new Date(i.startTime) >= monthStart).length;

      const withPain = all.filter(i => i.peakPainLevel);
      const avgPain  = withPain.length
        ? withPain.reduce((s, i) => s + i.peakPainLevel, 0) / withPain.length
        : null;

      const withDur  = all.filter(i => i.durationMinutes);
      const avgMins  = withDur.length
        ? withDur.reduce((s, i) => s + i.durationMinutes, 0) / withDur.length
        : null;

      return {
        thisMonth,
        avgPain,
        avgDuration: avgMins ? Utils.formatDuration(Math.round(avgMins)) : null,
      };
    },

    init() {
      // Live elapsed timer for active incident
      this.updateElapsed();
      this.elapsedTimer = setInterval(() => this.updateElapsed(), 30000);

      // Cleanup on view change
      document.addEventListener('view-loaded', () => {
        clearInterval(this.elapsedTimer);
      }, { once: true });
    },

    updateElapsed() {
      const active = this.activeEntry;
      if (active?.startTime) {
        this.elapsed = Utils.elapsed(active.startTime);
      }
    },

    async endAttack() {
      const active = this.activeEntry;
      if (!active) return;
      try {
        const incident = await Drive.loadIncident(active.id);
        await App.saveIncident(incident, { close: true });
        Notifications.stop();
      } catch (e) {
        Toast.error('Could not end attack. Please try again.');
      }
    },
  };
}
</script>
